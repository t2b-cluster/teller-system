global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

scrape_configs:
  # ── Prometheus self-monitoring ──
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ── Node Exporter (Host metrics: CPU, RAM, Disk) ──
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # ── cAdvisor (Container metrics) ──
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # ── Application Services ──
  - job_name: 'auth-service'
    metrics_path: '/api/v1/metrics'
    static_configs:
      - targets: ['auth-service:3005']

  - job_name: 'transfer-service'
    metrics_path: '/api/v1/metrics'
    static_configs:
      - targets: ['transfer-service:3001']

  - job_name: 'transaction-service'
    metrics_path: '/api/v1/metrics'
    static_configs:
      - targets: ['transaction-service:3002']

  - job_name: 'reconciliation-service'
    metrics_path: '/api/v1/metrics'
    static_configs:
      - targets: ['reconciliation-service:3003']

  - job_name: 'notification-service'
    metrics_path: '/api/v1/metrics'
    static_configs:
      - targets: ['notification-service:3004']

  # ── Redis Exporter ──
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # ── Kong Gateway ──
  - job_name: 'kong'
    static_configs:
      - targets: ['kong:8001']
    metrics_path: '/metrics'
