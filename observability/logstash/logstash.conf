input {
  beats {
    port => 5044
  }
}

filter {
  if [container][name] =~ "auth-service" {
    mutate { add_field => { "service_name" => "auth-service" } }
  } else if [container][name] =~ "transfer-service" {
    mutate { add_field => { "service_name" => "transfer-service" } }
  } else if [container][name] =~ "transaction-service" {
    mutate { add_field => { "service_name" => "transaction-service" } }
  } else if [container][name] =~ "reconciliation-service" {
    mutate { add_field => { "service_name" => "reconciliation-service" } }
  } else if [container][name] =~ "notification-service" {
    mutate { add_field => { "service_name" => "notification-service" } }
  } else {
    mutate { add_field => { "service_name" => "system" } }
  }

  if [json][level] {
    mutate { add_field => { "log_level" => "%{[json][level]}" } }
  }

  if [json][traceId] {
    mutate { add_field => { "trace_id" => "%{[json][traceId]}" } }
  }

  grok {
    match => { "message" => "%{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:level} %{GREEDYDATA:log_message}" }
    tag_on_failure => ["_grokparsefailure"]
  }

  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "teller-%{service_name}-%{+YYYY.MM.dd}"
  }
  stdout { codec => rubydebug }
}
