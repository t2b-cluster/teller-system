# =============================================================================
# Teller System — Kubernetes Deployment Manifests
# All services: Auth, Transfer, Transaction, Reconciliation, Notification, Frontend
# Registry: asia-southeast1-docker.pkg.dev/t2b-cluster/t2b (Artifact Registry)
# Namespace: tellersystem_uat
# =============================================================================

# ── ConfigMap (non-sensitive config) ──
apiVersion: v1
kind: ConfigMap
metadata:
  name: teller-config
  namespace: tellersystem_uat
data:
  DB_HOST: "192.168.50.41"
  DB_PORT: "1433"
  DB_DATABASE: "teller_db"
  DB_USERNAME: "sa"
  REDIS_HOST: "192.168.10.20"
  REDIS_PORT: "6379"
  AUTH_SERVICE_URL: "http://auth-service:3005"
  TRANSFER_SERVICE_URL: "http://transfer-service:3001"
  TRANSACTION_SERVICE_URL: "http://transaction-service:3002"
  RECONCILIATION_SERVICE_URL: "http://reconciliation-service:3003"
  NOTIFICATION_SERVICE_URL: "http://notification-service:3004"

---
# ── Secret (sensitive — change in production) ──
apiVersion: v1
kind: Secret
metadata:
  name: teller-secret
  namespace: tellersystem_uat
type: Opaque
stringData:
  DB_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  REDIS_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  JWT_SECRET: "CHANGE_ME_IN_PRODUCTION"

---
# =============================================================================
# Auth Service — JWT Authentication (Port 3005)
# Replicas: 2 | HPA Max: 5
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: tellersystem_uat
  labels:
    app: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: asia-southeast1-docker.pkg.dev/t2b-cluster/t2b/auth-service:IMAGE_TAG_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - containerPort: 3005
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3005"
          envFrom:
            - configMapRef:
                name: teller-config
            - secretRef:
                name: teller-secret
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3005
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3005
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: tellersystem_uat
  labels:
    app: auth-service
spec:
  type: ClusterIP
  ports:
    - port: 3005
      targetPort: 3005
      protocol: TCP
  selector:
    app: auth-service
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-service-hpa
  namespace: tellersystem_uat
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth-service
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

---
