# =============================================================================
# Ingress — Route external traffic
# apigw.teller.ppdoing.com → Kong API Gateway (port 8000)
# teller.ppdoing.com        → Frontend (port 80)
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: teller-ingress
  namespace: tellersystem-uat
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.global-static-ip-name: "teller-ingress-ip"
spec:
  rules:
    # ── API Gateway ──
    - host: apigw.teller.ppdoing.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kong
                port:
                  number: 8000

    # ── Frontend ──
    - host: teller.ppdoing.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
