# =============================================================================
# Ingress — Route external traffic
# apigw.teller.ppdoing.com → Kong API Gateway (port 8000)
# teller.ppdoing.com        → Frontend (port 80)
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: teller-ingress
  namespace: tellersystem-uat
spec:
  ingressClassName: gce
  rules:
    - host: apigw.teller.ppdoing.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kong
                port:
                  number: 8000

    - host: teller.ppdoing.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
