# =============================================================================
# Kong API Gateway — DB-less mode with declarative config
# =============================================================================

# ── Kong Config (declarative) ──
apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-config
  namespace: tellersystem-uat
data:
  kong.yml: |
    _format_version: "3.0"

    services:
      - name: auth-service
        url: http://auth-service:3005
        routes:
          - name: auth-routes
            paths:
              - /api/v1/auth
            strip_path: false

      - name: transfer-service
        url: http://transfer-service:3001
        routes:
          - name: transfer-routes
            paths:
              - /api/v1/transfers
            strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 100
              policy: redis
              redis_host: redis
              redis_port: 6379
              redis_password: tellerpass
          - name: cors
            config:
              origins: ["*"]
              methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
              headers: ["Content-Type", "Authorization", "x-idempotency-key"]

      - name: transaction-service
        url: http://transaction-service:3002
        routes:
          - name: transaction-routes
            paths:
              - /api/v1/transactions
            strip_path: false
          - name: balance-routes
            paths:
              - /api/v1/balance
            strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 200
              policy: redis
              redis_host: redis
              redis_port: 6379
              redis_password: tellerpass

      - name: reconciliation-service
        url: http://reconciliation-service:3003
        routes:
          - name: reconciliation-routes
            paths:
              - /api/v1/reconciliation
            strip_path: false

      - name: notification-service
        url: http://notification-service:3004
        routes:
          - name: notification-routes
            paths:
              - /api/v1/notifications
            strip_path: false

      - name: account-service
        url: http://transaction-service:3002
        routes:
          - name: account-routes
            paths:
              - /api/v1/accounts
            strip_path: false

    plugins:
      - name: request-transformer
        config:
          add:
            headers:
              - "X-Request-ID:$(uuid)"

---
# ── Kong Deployment (DB-less) ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong
  namespace: tellersystem-uat
  labels:
    app: kong
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kong
  template:
    metadata:
      labels:
        app: kong
    spec:
      containers:
        - name: kong
          image: kong:3.6
          ports:
            - containerPort: 8000
              name: proxy
            - containerPort: 8443
              name: proxy-ssl
            - containerPort: 8001
              name: admin
          env:
            - name: KONG_DATABASE
              value: "off"
            - name: KONG_DECLARATIVE_CONFIG
              value: "/etc/kong/kong.yml"
            - name: KONG_PROXY_ACCESS_LOG
              value: "/dev/stdout"
            - name: KONG_ADMIN_ACCESS_LOG
              value: "/dev/stdout"
            - name: KONG_PROXY_ERROR_LOG
              value: "/dev/stderr"
            - name: KONG_ADMIN_ERROR_LOG
              value: "/dev/stderr"
            - name: KONG_ADMIN_LISTEN
              value: "0.0.0.0:8001"
            - name: KONG_PROXY_LISTEN
              value: "0.0.0.0:8000, 0.0.0.0:8443 ssl"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /status
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /status
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 15
          volumeMounts:
            - name: kong-config-volume
              mountPath: /etc/kong
      volumes:
        - name: kong-config-volume
          configMap:
            name: kong-config
---
apiVersion: v1
kind: Service
metadata:
  name: kong
  namespace: tellersystem-uat
  labels:
    app: kong
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: proxy
    - port: 8443
      targetPort: 8443
      protocol: TCP
      name: proxy-ssl
    - port: 8001
      targetPort: 8001
      protocol: TCP
      name: admin
  selector:
    app: kong
