# =============================================================================
# Kong API Gateway — Postgres mode
# =============================================================================

# ── Kong Migration Job ──
apiVersion: batch/v1
kind: Job
metadata:
  name: kong-migration
  namespace: tellersystem-uat
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: kong-migration
          image: kong:3.6
          command: ["kong", "migrations", "bootstrap"]
          env:
            - name: KONG_DATABASE
              value: "postgres"
            - name: KONG_PG_HOST
              value: "10.30.0.6"
            - name: KONG_PG_PORT
              value: "5432"
            - name: KONG_PG_USER
              value: "kong"
            - name: KONG_PG_PASSWORD
              value: "T2b@Kong2024!"
            - name: KONG_PG_DATABASE
              value: "kong"

---
# ── Kong Config (declarative — loaded via Admin API after boot) ──
apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-config
  namespace: tellersystem-uat
data:
  setup-kong.sh: |
    #!/bin/sh
    echo "Waiting for Kong Admin API..."
    until wget -qO- http://localhost:8001/status > /dev/null 2>&1; do sleep 2; done
    echo "Kong is ready. Configuring routes..."

    KONG=http://localhost:8001

    # Auth Service (public)
    wget -qO- --post-data="name=auth-service&url=http://auth-service:3005" $KONG/services
    wget -qO- --post-data="name=auth-routes&paths[]=/api/v1/auth&strip_path=false" $KONG/services/auth-service/routes

    # Transfer Service
    wget -qO- --post-data="name=transfer-service&url=http://transfer-service:3001" $KONG/services
    wget -qO- --post-data="name=transfer-routes&paths[]=/api/v1/transfers&strip_path=false" $KONG/services/transfer-service/routes

    # Transaction Service
    wget -qO- --post-data="name=transaction-service&url=http://transaction-service:3002" $KONG/services
    wget -qO- --post-data="name=transaction-routes&paths[]=/api/v1/transactions&strip_path=false" $KONG/services/transaction-service/routes
    wget -qO- --post-data="name=balance-routes&paths[]=/api/v1/balance&strip_path=false" $KONG/services/transaction-service/routes
    wget -qO- --post-data="name=account-routes&paths[]=/api/v1/accounts&strip_path=false" $KONG/services/transaction-service/routes

    # Reconciliation Service
    wget -qO- --post-data="name=reconciliation-service&url=http://reconciliation-service:3003" $KONG/services
    wget -qO- --post-data="name=reconciliation-routes&paths[]=/api/v1/reconciliation&strip_path=false" $KONG/services/reconciliation-service/routes

    # Notification Service
    wget -qO- --post-data="name=notification-service&url=http://notification-service:3004" $KONG/services
    wget -qO- --post-data="name=notification-routes&paths[]=/api/v1/notifications&strip_path=false" $KONG/services/notification-service/routes

    # Rate Limiting
    wget -qO- --post-data="name=rate-limiting&config.minute=100&config.policy=local" $KONG/plugins

    echo "Kong setup complete."

---
# ── Kong Deployment (Postgres) ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong
  namespace: tellersystem-uat
  labels:
    app: kong
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kong
  template:
    metadata:
      labels:
        app: kong
    spec:
      initContainers:
        - name: kong-setup
          image: kong:3.6
          command: ["/bin/sh", "/etc/kong-config/setup-kong.sh"]
          volumeMounts:
            - name: kong-config-volume
              mountPath: /etc/kong-config
      containers:
        - name: kong
          image: kong:3.6
          ports:
            - containerPort: 8000
              name: proxy
            - containerPort: 8443
              name: proxy-ssl
            - containerPort: 8001
              name: admin
          env:
            - name: KONG_DATABASE
              value: "postgres"
            - name: KONG_PG_HOST
              value: "10.30.0.6"
            - name: KONG_PG_PORT
              value: "5432"
            - name: KONG_PG_USER
              value: "kong"
            - name: KONG_PG_PASSWORD
              value: "T2b@Kong2024!"
            - name: KONG_PG_DATABASE
              value: "kong"
            - name: KONG_PROXY_ACCESS_LOG
              value: "/dev/stdout"
            - name: KONG_ADMIN_ACCESS_LOG
              value: "/dev/stdout"
            - name: KONG_PROXY_ERROR_LOG
              value: "/dev/stderr"
            - name: KONG_ADMIN_ERROR_LOG
              value: "/dev/stderr"
            - name: KONG_ADMIN_LISTEN
              value: "0.0.0.0:8001"
            - name: KONG_PROXY_LISTEN
              value: "0.0.0.0:8000, 0.0.0.0:8443 ssl"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /status
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /status
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 15
      volumes:
        - name: kong-config-volume
          configMap:
            name: kong-config
---
apiVersion: v1
kind: Service
metadata:
  name: kong
  namespace: tellersystem-uat
  labels:
    app: kong
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: proxy
    - port: 8443
      targetPort: 8443
      protocol: TCP
      name: proxy-ssl
    - port: 8001
      targetPort: 8001
      protocol: TCP
      name: admin
  selector:
    app: kong
