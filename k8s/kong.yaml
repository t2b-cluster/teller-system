# =============================================================================
# Kong API Gateway — Postgres mode
# =============================================================================

# ── Kong Migration Job ──
apiVersion: batch/v1
kind: Job
metadata:
  name: kong-migration
  namespace: tellersystem-uat
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: kong-migration
          image: kong:3.6
          command: ["kong", "migrations", "bootstrap"]
          env:
            - name: KONG_DATABASE
              value: "postgres"
            - name: KONG_PG_HOST
              value: "10.30.0.6"
            - name: KONG_PG_PORT
              value: "5432"
            - name: KONG_PG_USER
              value: "kong"
            - name: KONG_PG_PASSWORD
              value: "T2b@Kong2024!"
            - name: KONG_PG_DATABASE
              value: "kong"

---
# ── Kong Deployment ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong
  namespace: tellersystem-uat
  labels:
    app: kong
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kong
  template:
    metadata:
      labels:
        app: kong
    spec:
      containers:
        - name: kong
          image: kong:3.6
          ports:
            - containerPort: 8000
              name: proxy
            - containerPort: 8443
              name: proxy-ssl
            - containerPort: 8001
              name: admin
          env:
            - name: KONG_DATABASE
              value: "postgres"
            - name: KONG_PG_HOST
              value: "10.30.0.6"
            - name: KONG_PG_PORT
              value: "5432"
            - name: KONG_PG_USER
              value: "kong"
            - name: KONG_PG_PASSWORD
              value: "T2b@Kong2024!"
            - name: KONG_PG_DATABASE
              value: "kong"
            - name: KONG_PROXY_ACCESS_LOG
              value: "/dev/stdout"
            - name: KONG_ADMIN_ACCESS_LOG
              value: "/dev/stdout"
            - name: KONG_PROXY_ERROR_LOG
              value: "/dev/stderr"
            - name: KONG_ADMIN_ERROR_LOG
              value: "/dev/stderr"
            - name: KONG_ADMIN_LISTEN
              value: "0.0.0.0:8001"
            - name: KONG_PROXY_LISTEN
              value: "0.0.0.0:8000, 0.0.0.0:8443 ssl"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15

---
apiVersion: v1
kind: Service
metadata:
  name: kong
  namespace: tellersystem-uat
  labels:
    app: kong
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: proxy
    - port: 8443
      targetPort: 8443
      protocol: TCP
      name: proxy-ssl
    - port: 8001
      targetPort: 8001
      protocol: TCP
      name: admin
  selector:
    app: kong

---
# ── Kong Route Setup Job (runs after Kong is ready) ──
apiVersion: batch/v1
kind: Job
metadata:
  name: kong-setup-routes
  namespace: tellersystem-uat
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: kong-setup
          image: curlimages/curl:latest
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for Kong Admin API..."
              until curl -sf http://kong:8001/status > /dev/null 2>&1; do sleep 5; done
              echo "Kong is ready. Setting up routes..."

              KONG=http://kong:8001

              # Auth Service
              curl -sf -X POST $KONG/services -d name=auth-service -d url=http://auth-service:3005
              curl -sf -X POST $KONG/services/auth-service/routes -d name=auth-routes -d "paths[]=/api/v1/auth" -d strip_path=false

              # Transfer Service
              curl -sf -X POST $KONG/services -d name=transfer-service -d url=http://transfer-service:3001
              curl -sf -X POST $KONG/services/transfer-service/routes -d name=transfer-routes -d "paths[]=/api/v1/transfers" -d strip_path=false

              # Transaction Service
              curl -sf -X POST $KONG/services -d name=transaction-service -d url=http://transaction-service:3002
              curl -sf -X POST $KONG/services/transaction-service/routes -d name=transaction-routes -d "paths[]=/api/v1/transactions" -d strip_path=false
              curl -sf -X POST $KONG/services/transaction-service/routes -d name=balance-routes -d "paths[]=/api/v1/balance" -d strip_path=false
              curl -sf -X POST $KONG/services/transaction-service/routes -d name=account-routes -d "paths[]=/api/v1/accounts" -d strip_path=false

              # Reconciliation Service
              curl -sf -X POST $KONG/services -d name=reconciliation-service -d url=http://reconciliation-service:3003
              curl -sf -X POST $KONG/services/reconciliation-service/routes -d name=reconciliation-routes -d "paths[]=/api/v1/reconciliation" -d strip_path=false

              # Notification Service
              curl -sf -X POST $KONG/services -d name=notification-service -d url=http://notification-service:3004
              curl -sf -X POST $KONG/services/notification-service/routes -d name=notification-routes -d "paths[]=/api/v1/notifications" -d strip_path=false

              # Rate Limiting
              curl -sf -X POST $KONG/plugins -d name=rate-limiting -d "config.minute=100" -d "config.policy=local"

              echo ""
              echo "Kong setup complete!"
