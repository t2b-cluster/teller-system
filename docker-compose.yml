version: '3.8'

services:
  # ── API Gateway (Kong) ──
  kong-database:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: kong
      POSTGRES_DB: kong
      POSTGRES_PASSWORD: kongpass
    volumes:
      - kong-db-data:/var/lib/postgresql/data
    networks:
      - teller-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kong"]
      interval: 10s
      timeout: 5s
      retries: 5

  kong-migration:
    image: kong:3.6
    command: kong migrations bootstrap
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kongpass
    depends_on:
      kong-database:
        condition: service_healthy
    networks:
      - teller-network

  kong:
    image: kong:3.6
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kongpass
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_ADMIN_GUI_URL: http://localhost:8002
    ports:
      - "8000:8000"   # Proxy
      - "8001:8001"   # Admin API
      - "8002:8002"   # Admin GUI
      - "8443:8443"   # Proxy SSL
    depends_on:
      kong-database:
        condition: service_healthy
      kong-migration:
        condition: service_completed_successfully
    networks:
      - teller-network
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Message Queue (Redis for BullMQ) ──
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass tellerpass --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - teller-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "tellerpass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── SQL Server ──
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "TellerPass@123"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - teller-network
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "TellerPass@123" -C -Q "SELECT 1" -b
      interval: 15s
      timeout: 10s
      retries: 5

  # ── DB Init (run migrations/seed) ──
  db-init:
    image: mcr.microsoft.com/mssql-tools:latest
    volumes:
      - ./infrastructure/db/init.sql:/init.sql
    entrypoint: ["/bin/bash", "-c", "sleep 15 && /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P 'TellerPass@123' -C -i /init.sql"]
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - teller-network

  # ── Auth Service ──
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    environment:
      PORT: 3005
      DB_HOST: sqlserver
      DB_PORT: 1433
      DB_USERNAME: sa
      DB_PASSWORD: "TellerPass@123"
      DB_DATABASE: teller_db
      JWT_SECRET: "teller-jwt-secret-change-in-production"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: tellerpass
    ports:
      - "3005:3005"
    depends_on:
      redis:
        condition: service_healthy
      sqlserver:
        condition: service_healthy
    networks:
      - teller-network

  # ── Transfer Service ──
  transfer-service:
    build:
      context: .
      dockerfile: services/transfer-service/Dockerfile
    environment:
      PORT: 3001
      DB_HOST: sqlserver
      DB_PORT: 1433
      DB_USERNAME: sa
      DB_PASSWORD: "TellerPass@123"
      DB_DATABASE: teller_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: tellerpass
      QUEUE_NAME: transfer-queue
    ports:
      - "3001:3001"
    depends_on:
      redis:
        condition: service_healthy
      sqlserver:
        condition: service_healthy
    networks:
      - teller-network

  # ── Transaction Service ──
  transaction-service:
    build:
      context: .
      dockerfile: services/transaction-service/Dockerfile
    environment:
      PORT: 3002
      DB_HOST: sqlserver
      DB_PORT: 1433
      DB_USERNAME: sa
      DB_PASSWORD: "TellerPass@123"
      DB_DATABASE: teller_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: tellerpass
    ports:
      - "3002:3002"
    depends_on:
      redis:
        condition: service_healthy
      sqlserver:
        condition: service_healthy
    networks:
      - teller-network

  # ── Reconciliation Service ──
  reconciliation-service:
    build:
      context: .
      dockerfile: services/reconciliation-service/Dockerfile
    environment:
      PORT: 3003
      DB_HOST: sqlserver
      DB_PORT: 1433
      DB_USERNAME: sa
      DB_PASSWORD: "TellerPass@123"
      DB_DATABASE: teller_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: tellerpass
      QUEUE_NAME: reconciliation-queue
    ports:
      - "3003:3003"
    depends_on:
      redis:
        condition: service_healthy
      sqlserver:
        condition: service_healthy
    networks:
      - teller-network

  # ── Notification Service ──
  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    environment:
      PORT: 3004
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: tellerpass
      QUEUE_NAME: notification-queue
    ports:
      - "3004:3004"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - teller-network

  # ── Frontend (React + Nginx) ──
  frontend:
    build:
      context: .
      dockerfile: services/frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      kong:
        condition: service_healthy
    networks:
      - teller-network

volumes:
  kong-db-data:
  redis-data:
  sqlserver-data:

networks:
  teller-network:
    driver: bridge
