version: '3.8'

services:
  # ── API Gateway (Kong)  ──
  kong-database:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: kong
      POSTGRES_DB: kong
      POSTGRES_PASSWORD: kongpass
    volumes:
      - kong-db-data:/var/lib/postgresql/data
    networks:
      - teller-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kong"]
      interval: 10s
      timeout: 5s
      retries: 5

  kong-migration:
    image: kong:3.6
    command: kong migrations bootstrap
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kongpass
    depends_on:
      kong-database:
        condition: service_healthy
    networks:
      - teller-network

  kong:
    image: kong:3.6
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kongpass
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_ADMIN_GUI_URL: http://localhost:8002
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
      - "8443:8443"
    depends_on:
      kong-database:
        condition: service_healthy
      kong-migration:
        condition: service_completed_successfully
    networks:
      - teller-network
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Message Queue (Redis for BullMQ) ──
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass tellerpass --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - teller-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "tellerpass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── SQL Server ──
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "TellerPass@123"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - teller-network
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "TellerPass@123" -C -Q "SELECT 1" -b
      interval: 15s
      timeout: 10s
      retries: 5

  # ── DB Init (run migrations/seed) ──
  db-init:
    image: mcr.microsoft.com/mssql-tools:latest
    volumes:
      - ./infrastructure/db/init.sql:/init.sql
    entrypoint: ["/bin/bash", "-c", "sleep 15 && /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P 'TellerPass@123' -C -i /init.sql"]
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - teller-network

  # ── Auth Service ──
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    environment:
      PORT: 3005
      SERVICE_NAME: auth-service
      DB_HOST: sqlserver
      DB_PORT: 1433
      DB_USERNAME: sa
      DB_PASSWORD: "TellerPass@123"
      DB_DATABASE: teller_db
      JWT_SECRET: "teller-jwt-secret-change-in-production"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: tellerpass
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "3005:3005"
    depends_on:
      redis:
        condition: service_healthy
      sqlserver:
        condition: service_healthy
    networks:
      - teller-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service"
    labels:
      service: "auth-service"

  # ── Transfer Service ──
  transfer-service:
    build:
      context: .
      dockerfile: services/transfer-service/Dockerfile
    environment:
      PORT: 3001
      SERVICE_NAME: transfer-service
      DB_HOST: sqlserver
      DB_PORT: 1433
      DB_USERNAME: sa
      DB_PASSWORD: "TellerPass@123"
      DB_DATABASE: teller_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: tellerpass
      QUEUE_NAME: transfer-queue
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "3001:3001"
    depends_on:
      redis:
        condition: service_healthy
      sqlserver:
        condition: service_healthy
    networks:
      - teller-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      service: "transfer-service"

  # ── Transaction Service ──
  transaction-service:
    build:
      context: .
      dockerfile: services/transaction-service/Dockerfile
    environment:
      PORT: 3002
      SERVICE_NAME: transaction-service
      DB_HOST: sqlserver
      DB_PORT: 1433
      DB_USERNAME: sa
      DB_PASSWORD: "TellerPass@123"
      DB_DATABASE: teller_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: tellerpass
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "3002:3002"
    depends_on:
      redis:
        condition: service_healthy
      sqlserver:
        condition: service_healthy
    networks:
      - teller-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      service: "transaction-service"

  # ── Reconciliation Service ──
  reconciliation-service:
    build:
      context: .
      dockerfile: services/reconciliation-service/Dockerfile
    environment:
      PORT: 3003
      SERVICE_NAME: reconciliation-service
      DB_HOST: sqlserver
      DB_PORT: 1433
      DB_USERNAME: sa
      DB_PASSWORD: "TellerPass@123"
      DB_DATABASE: teller_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: tellerpass
      QUEUE_NAME: reconciliation-queue
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "3003:3003"
    depends_on:
      redis:
        condition: service_healthy
      sqlserver:
        condition: service_healthy
    networks:
      - teller-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      service: "reconciliation-service"

  # ── Notification Service ──
  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    environment:
      PORT: 3004
      SERVICE_NAME: notification-service
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: tellerpass
      QUEUE_NAME: notification-queue
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "3004:3004"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - teller-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      service: "notification-service"

  # ── Frontend (React + Nginx) ──
  frontend:
    build:
      context: .
      dockerfile: services/frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      kong:
        condition: service_healthy
    networks:
      - teller-network

  # ═══════════════════════════════════════════════════
  # ══  OBSERVABILITY STACK                          ══
  # ═══════════════════════════════════════════════════

  # ── Observability Nginx Reverse Proxy ──
  observability-proxy:
    image: nginx:alpine
    volumes:
      - ./observability/nginx/grafana.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8888:80"
    depends_on:
      - grafana
      - jaeger
      - kibana
      - prometheus
    networks:
      - teller-network
    restart: unless-stopped

  # ── Prometheus ──
  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - teller-network
    restart: unless-stopped

  # ── Grafana ──
  grafana:
    image: grafana/grafana:10.4.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "https://grafana.teller.tvdoing.com"
      GF_SERVER_DOMAIN: "grafana.teller.tvdoing.com"
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Editor"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - teller-network
    restart: unless-stopped

  # ── Node Exporter (Host metrics) ──
  node-exporter:
    image: prom/node-exporter:v1.7.0
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    networks:
      - teller-network
    restart: unless-stopped

  # ── cAdvisor (Container metrics) ──
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8080:8080"
    networks:
      - teller-network
    restart: unless-stopped

  # ── Redis Exporter ──
  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    environment:
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: tellerpass
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - teller-network
    restart: unless-stopped

  # ── Elasticsearch ──
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - ./observability/elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      - teller-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ── Logstash ──
  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.0
    volumes:
      - ./observability/logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
      - ./observability/logstash/logstash.yml:/usr/share/logstash/config/logstash.yml
    ports:
      - "5044:5044"
      - "9600:9600"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - teller-network
    restart: unless-stopped

  # ── Kibana ──
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    volumes:
      - ./observability/kibana/kibana.yml:/usr/share/kibana/config/kibana.yml
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - teller-network
    restart: unless-stopped

  # ── Filebeat ──
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.13.0
    user: root
    volumes:
      - ./observability/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - teller-network
    restart: unless-stopped

  # ── Jaeger (Distributed Tracing) ──
  jaeger:
    image: jaegertracing/all-in-one:1.55
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "14268:14268"
      - "4317:4317"
      - "4318:4318"
    networks:
      - teller-network
    restart: unless-stopped

  # ── OpenTelemetry Collector ──
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    volumes:
      - ./observability/otel/otel-collector-config.yml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4319:4317"
      - "4320:4318"
      - "8889:8889"
    depends_on:
      - jaeger
    networks:
      - teller-network
    restart: unless-stopped

volumes:
  kong-db-data:
  redis-data:
  sqlserver-data:
  prometheus-data:
  grafana-data:
  elasticsearch-data:

networks:
  teller-network:
    driver: bridge
